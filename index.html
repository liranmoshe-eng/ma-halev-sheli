<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>מה הלב שלי אומר לי 💭</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Heebo',sans-serif;direction:rtl;background:#0f0e1a;color:#f0eeff;}

@keyframes cfFall{from{transform:translateY(-10px) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(600deg);opacity:0}}
@keyframes popIn{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

.screen{display:none;flex-direction:column;height:100vh;}
.screen.active{display:flex;}
#setupScreen{height:auto;min-height:100vh;}
#winScreen{height:auto;min-height:100vh;}

/* ══ SETUP ══ */
#setupScreen{
  align-items:center;justify-content:center;padding:24px 16px;overflow-y:auto;
  background:radial-gradient(ellipse at 60% 30%,#2d1b7a 0%,#0f0e1a 70%);
}
.sc{
  background:#1a1928;border:1px solid rgba(108,99,255,.25);
  border-radius:24px;padding:36px 32px;max-width:520px;width:100%;
  box-shadow:0 20px 60px rgba(108,99,255,.22);
}
.s-logo{font-size:3em;text-align:center;margin-bottom:6px;}
.s-title{
  font-size:1.9em;font-weight:900;text-align:center;margin-bottom:5px;
  background:linear-gradient(135deg,#a89fff,#ff8fab);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.s-sub{text-align:center;color:#9b99bb;font-size:.95em;margin-bottom:28px;}
.s-lbl{font-size:.85em;font-weight:700;color:#9b99bb;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.plist{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.prow{display:flex;align-items:center;gap:8px;background:#252438;border:1px solid rgba(108,99,255,.2);border-radius:12px;padding:11px 13px;}
.pname{flex:1;background:transparent;border:none;outline:none;color:#f0eeff;font-family:'Heebo',sans-serif;font-size:1.05em;font-weight:600;min-width:0;}
.pname::placeholder{color:#9b99bb;}
.swatches{display:flex;gap:6px;flex-wrap:wrap;}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0;}
.sw.on{border-color:#fff;transform:scale(1.3);box-shadow:0 0 10px rgba(255,255,255,.5);}
.rmbtn{background:none;border:none;color:#9b99bb;cursor:pointer;font-size:1.15em;flex-shrink:0;}
.rmbtn:hover{color:#FF6B6B;}
.add-p-btn{width:100%;padding:11px;background:none;border:1.5px dashed rgba(108,99,255,.28);color:#9b99bb;border-radius:10px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.95em;transition:all .2s;margin-bottom:24px;}
.add-p-btn:hover{border-color:#a89fff;color:#a89fff;}
.go-btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#6C63FF,#9b59f5);color:#fff;font-family:'Heebo',sans-serif;font-size:1.2em;font-weight:900;cursor:pointer;box-shadow:0 8px 28px rgba(108,99,255,.4);transition:all .3s;}
.go-btn:hover{transform:translateY(-2px);}

/* ══ HEADER ══ */
#gameScreen{background:#0f0e1a;}
.ghead{background:#1a1928;border-bottom:1px solid rgba(108,99,255,.2);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.gtitle{font-size:1em;font-weight:900;white-space:nowrap;}
.pbar{display:flex;gap:7px;flex-wrap:wrap;flex:1;justify-content:center;}
.chip{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:2px solid transparent;font-size:.88em;font-weight:700;background:#252438;transition:all .3s;}
.chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chip .pts{background:#0f0e1a;border-radius:6px;padding:2px 8px;font-size:.82em;}
.hbtns{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.hbtn{padding:8px 14px;border-radius:9px;border:1.5px solid rgba(108,99,255,.22);background:none;color:#9b99bb;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.88em;font-weight:700;transition:all .2s;white-space:nowrap;}
.hbtn:hover{background:#252438;color:#f0eeff;}
.hbtn.pri{background:#6C63FF;color:#fff;border-color:#6C63FF;}
.hbtn.pri:hover{background:#5a52e0;}
.hbtn.match-btn{background:#065f46;color:#6ee7b7;border-color:#43D08A;}
.hbtn.match-btn:hover{background:#0d7a5f;}
.hbtn.match-btn.no-match{animation:shake .4s ease;}
.hbtn:disabled{opacity:.32;cursor:default;pointer-events:none;}

/* turn banner */
.tbanner{padding:5px 12px;font-size:.88em;font-weight:700;text-align:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);}

/* ══ CATEGORY TOGGLES ══ */
.cat-toggles{display:flex;gap:6px;padding:5px 12px;flex-wrap:wrap;align-items:center;background:#1a1928;border-bottom:1px solid rgba(108,99,255,.12);flex-shrink:0;}
.ct-label{font-size:.82em;font-weight:700;color:#9b99bb;margin-left:6px;}
.cat-tog{padding:7px 14px;border-radius:20px;border:2px solid;font-family:'Heebo',sans-serif;font-size:.82em;font-weight:700;cursor:pointer;transition:all .2s;color:#fff;}
.cat-tog.off{opacity:.3;background:transparent !important;}
.ct-mode{padding:7px 14px;border-radius:20px;border:2px solid #43D08A;background:transparent;color:#9b99bb;font-family:'Heebo',sans-serif;font-size:.82em;font-weight:700;cursor:pointer;transition:all .2s;margin-right:auto;}
.ct-mode.on{background:#065f46;color:#6ee7b7;}

/* ══ BOARD ══ */
.board-wrap{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;}
.board-blocks{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;flex:1;align-content:start;}
.cat-block{flex:1 1 0;min-width:180px;}
.cat-block.hidden{display:none;}
.cat-block-hdr{padding:6px 10px;border-radius:10px 10px 0 0;font-size:.85em;font-weight:900;text-align:center;color:#fff;line-height:1.2;}
.cat-block-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:6px;background:#1a1928;border:1px solid rgba(108,99,255,.15);border-top:none;border-radius:0 0 10px 10px;}

/* ══ CARD ══ */
.card{background:#252438;border:2px solid rgba(108,99,255,.22);border-radius:9px;cursor:pointer;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:6px 5px;text-align:center;gap:2px;user-select:none;transition:transform .15s,box-shadow .15s,border-color .2s,background .3s;}
.card:hover:not(.locked):not(.completed){transform:translateY(-2px);box-shadow:0 5px 18px rgba(108,99,255,.3);border-color:rgba(108,99,255,.55);}
.c-num{font-size:1.5em;font-weight:900;color:rgba(255,255,255,.42);line-height:1;padding:4px 0;}
.c-lbl{display:none;}
.c-img{display:none;}
.c-name{display:none;}
.c-text{display:none;}

.card.open-img .c-num{display:none;}
.card.open-img .c-lbl{display:block;font-size:.7em;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px;}
.card.open-img .c-img{display:block;width:80%;max-width:90px;border-radius:8px;object-fit:cover;aspect-ratio:1;}

.card.open-full .c-num{display:none;}
.card.open-full .c-lbl{display:block;font-size:.7em;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px;}
.card.open-full .c-img{display:block;width:70%;max-width:80px;border-radius:8px;object-fit:cover;aspect-ratio:1;}
.card.open-full .c-name{display:block;font-size:1em;font-weight:900;margin-top:3px;}
.card.open-full .c-text{display:block;font-size:.78em;font-weight:700;line-height:1.35;color:rgba(240,238,255,.95);}

.card.locked{cursor:default;pointer-events:none;}
.card.open-img.locked{pointer-events:all;cursor:pointer;}

/* selected emotion card (always-open mode) */
.card.selected{border-color:#43D08A !important;box-shadow:0 0 18px rgba(67,208,138,.5) !important;background:#0d2b1e !important;}

/* completed emotion card */
.card.completed{opacity:.35;pointer-events:none;position:relative;}
.card.completed::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2em;color:#43D08A;text-shadow:0 0 10px rgba(67,208,138,.8);}

/* empty slot */
.card-empty{border:2px dashed rgba(108,99,255,.12);border-radius:9px;background:rgba(37,36,56,.25);display:flex;align-items:center;justify-content:center;padding:6px 5px;}
.card-empty::after{content:'·';font-size:1.5em;color:rgba(255,255,255,.08);}

/* ══ MATCHED AREA (table) ══ */
.matched-area{border-top:1px solid rgba(108,99,255,.15);padding:4px 8px;background:#111020;flex-shrink:0;max-height:22vh;overflow-y:auto;}
.matched-area-title{font-size:.7em;font-weight:700;color:#9b99bb;text-align:center;margin-bottom:3px;}
.matched-table{width:100%;border-collapse:separate;border-spacing:3px;}
.matched-table th{padding:4px 8px;font-size:.72em;font-weight:900;border-radius:6px;text-align:center;white-space:nowrap;}
.matched-table td{vertical-align:top;padding:1px 2px;}
.mt-series{display:flex;align-items:center;gap:4px;padding:2px 5px;border-radius:5px;background:#252438;border:1px solid rgba(108,99,255,.15);margin-bottom:2px;font-size:.65em;font-weight:700;animation:slideDown .35s ease;cursor:pointer;transition:all .2s;}
.mt-series:hover{background:#353458;border-color:rgba(108,99,255,.4);}
.mt-series.active{border-color:#43D08A;background:#0d2b1e;box-shadow:0 0 10px rgba(67,208,138,.3);}
.mt-series img{width:16px;height:16px;border-radius:3px;object-fit:cover;flex-shrink:0;}
.mt-count{margin-right:auto;background:#0f0e1a;border-radius:4px;padding:1px 5px;font-size:.9em;color:#9b99bb;}
.mt-series.complete .mt-count{background:#065f46;color:#6ee7b7;}

/* ══ FOOTER ══ */
.gfoot{padding:4px 12px;background:#1a1928;border-top:1px solid rgba(108,99,255,.18);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:.78em;color:#9b99bb;font-weight:600;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:13px 26px;border-radius:12px;font-weight:700;font-size:1em;z-index:999;pointer-events:none;white-space:nowrap;animation:popIn .25s ease;}
.toast.ok{background:#0d2b1e;border:2px solid #43D08A;color:#6ee7b7;}
.toast.info{background:#1a1035;border:2px solid #6C63FF;color:#a89fff;}
.toast.wrong{background:#2b1020;border:2px solid #F472B6;color:#fbb6ce;}

/* ══ FEEDBACK BANNER ══ */
.feedback-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);padding:24px 40px;border-radius:20px;font-weight:900;font-size:1.4em;z-index:1000;pointer-events:none;text-align:center;line-height:1.6;transition:transform .3s cubic-bezier(.2,1.4,.5,1),opacity .3s;}
.feedback-banner.show{transform:translate(-50%,-50%) scale(1);}
.feedback-banner.ok{background:#0d2b1e;border:3px solid #43D08A;color:#6ee7b7;box-shadow:0 12px 40px rgba(67,208,138,.35);}
.feedback-banner.wrong{background:#2b1020;border:3px solid #F472B6;color:#fbb6ce;box-shadow:0 12px 40px rgba(244,114,182,.3);}

/* ══ WIN ══ */
#winScreen{align-items:center;justify-content:center;padding:28px 20px;background:radial-gradient(ellipse at 50% 40%,#1a2a5e 0%,#0f0e1a 70%);}
.w-card{background:#1a1928;border:1px solid rgba(108,99,255,.22);border-radius:22px;padding:36px 32px;max-width:480px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(108,99,255,.22);}
.w-title{font-size:2.4em;font-weight:900;margin-bottom:6px;}
.w-sub{color:#9b99bb;margin-bottom:24px;font-size:1.05em;}
.wscores{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.wrow{display:flex;align-items:center;gap:12px;background:#252438;border-radius:12px;padding:14px 16px;border:2px solid rgba(108,99,255,.2);}
.wrow.gold{border-color:#FFD166;background:rgba(255,209,102,.07);}
.wrank{font-size:1.4em;}
.wname{flex:1;font-weight:700;text-align:right;font-size:1.1em;}
.wpts{font-size:1.1em;font-weight:900;color:#FFD166;}
.wagain{padding:15px 36px;border-radius:14px;border:none;background:linear-gradient(135deg,#6C63FF,#9b59f5);color:#fff;font-family:'Heebo',sans-serif;font-size:1.05em;font-weight:900;cursor:pointer;box-shadow:0 7px 25px rgba(108,99,255,.4);transition:all .3s;}
.wagain:hover{transform:translateY(-2px);}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="setupScreen">
  <div class="sc">
    <div class="s-logo">💭</div>
    <div class="s-title">מה הלב שלי אומר לי</div>
    <div class="s-sub">משחק לימודי-חווייתי של רגשות</div>
    <div class="s-lbl">שחקנים</div>
    <div class="plist" id="plist"></div>
    <button class="add-p-btn" id="addBtn" onclick="addRow()">+ הוסף שחקן</button>
    <button class="go-btn" onclick="startGame()">▶ התחל משחק</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <div class="ghead">
    <div class="gtitle">מה הלב שלי אומר לי 💭</div>
    <div class="pbar" id="pbar"></div>
    <div class="hbtns">
      <button class="hbtn match-btn" onclick="checkMatch()">🔍 בדוק התאמה</button>
      <button class="hbtn pri" onclick="endTurn()">✓ סיימתי תור</button>
      <button class="hbtn" id="undoBtn" onclick="doUndo()" disabled>↩ חזור</button>
      <button class="hbtn" onclick="restart()">🔄 מחדש</button>
      <button class="hbtn" onclick="goSetup()">⚙</button>
    </div>
  </div>
  <div class="tbanner" id="tbanner"><span id="turnTxt"></span></div>

  <!-- Category Toggles -->
  <div class="cat-toggles" id="catToggles"></div>

  <div class="board-wrap">
    <div class="board-blocks" id="boardBlocks"></div>

    <!-- Matched Area (table) -->
    <div class="matched-area" id="matchedArea" style="display:none">
      <div class="matched-area-title">🎴 קלפים שהותאמו</div>
      <div id="matchedList"></div>
    </div>
  </div>

  <div class="gfoot">
    <span id="progTxt">0 / 12 סדרות</span>
  </div>
</div>

<!-- WIN -->
<div class="screen" id="winScreen">
  <div class="w-card">
    <div class="w-title">🏆 המשחק הסתיים!</div>
    <div class="w-sub">כל הכבוד לכולם!</div>
    <div class="wscores" id="wscores"></div>
    <button class="wagain" onclick="goSetup()">🔄 משחק חדש</button>
  </div>
</div>

<script>
const IMGS={"כעס":"assets/כעס.png","פחד":"assets/פחד.png","עצב":"assets/עצב.png","עלבון":"assets/עלבון.png","ביישנות":"assets/ביישנות.png","אשמה":"assets/אשמה.png","בלבול":"assets/בלבול.png","שמחה":"assets/שמחה.png","גאווה":"assets/גאווה.png","רוגע":"assets/רוגע.png","תסכול":"assets/תסכול.png","קנאה":"assets/קנאה.png"};

const EDATA = {
  כעס:   {signal:"מישהו לא היה הוגן אתי, פגע בי, או לא קיבלתי מה שרציתי", body:"לב דופק מהר, הגוף מתוח ומתקשה, חום בפנים", help:"לעצור רגע לקחת אוויר ולנשום, לשאול האם אני יכול לפתור לבד או שאני צריך עזרה ממבוגר, זה גם בסדר"},
  פחד:   {signal:"יכול להיות שיש סכנה", body:"לב דופק מהר, נשימה מהירה, גוף רועד משתתק או רוצה לברוח", help:"לבדוק מה גודל הסכנה, להחליט אם אני יכול להתמודד לבד או כדאי מאוד שאזעיק עזרה"},
  עצב:   {signal:"משהו שהיה חשוב לי חסר עכשיו או נגמר", body:"דמעות, הלב כבד, אין חשק לעשות כלום", help:"אני יכול להגיד לעצמי שזה בסדר, שינויים הם חלק מהחיים. כדאי גם לשתף, זה יעזור לי להרגיש שאני לא לבד ושיש מישהו שמבין אותי"},
  עלבון: {signal:"מישהו אמר או עשה משהו שפגע בי", body:"הרגשת חום בפנים, לחיים אדומות, רצון להתחבא ושלא יראו אותי", help:"לזכור שלא כל מה שמדברים עלי הוא נכון, אפשר להתרחק מהמקום ולדעת שתמיד מגיע לי יחס מכבד"},
  ביישנות:  {signal:"אני מתנסה עכשיו במשהו חדש או משהו שאני לא בטוח לגביו ועדיין אין לי את האומץ לנסות", body:"יש לי מחשבות שמשתקות ומונעות ממני לפעול, הלב דופק מהר, חום בלחיים", help:"לזכור ולדעת שאני לא צריך להיות כמו כולם, להיות בטוח במי שאני, ולנסות צעד קטן אחד כשאני מוכן"},
  אשמה:  {signal:"עשיתי משהו שפגע במישהו או לא היה נכון", body:"כאב בלב, תחושת אי נוחות, דאגה על מה שעשינו והתחרטנו עליו", help:"לקבל את זה שעשיתי טעות, ככה לומדים. חשוב לקחת אחריות, להתנצל או לנסות לתקן"},
  בלבול: {signal:"אני לא מבין מה קורה כאן", body:"הראש מלא מחשבות שלא מסתדרות, מסתכל סביב ולא מצליח להבין מה קורה", help:"זה בסדר שלא הבנתי את הכל בפעם הראשונה, אפשר לעצור לקחת אוויר ולבקש הסבר"},
  שמחה:  {signal:"קרה משהו טוב או כיף", body:"חיוך, קלילות בגוף, הרבה אנרגיה", help:"ליהנות מהרגע, לזכור אותו גם ברגעים שמרגיש שהכל שחור"},
  גאווה: {signal:"התאמצתי והצלחתי", body:"חיוך גדול ומרוצה, תחושת ביטחון, גב זקוף", help:"זה אומר עלי ששווה להתאמץ כמה שצריך, ולהזכיר לעצמי כל הזמן שאני מסוגל ויכול גם כשקשה לי"},
  רוגע:  {signal:"אני מרגיש בטוח ושקט", body:"נשימה עמוקה, גוף רפוי", help:"לשים לב מה עוזר לי להירגע, וכשאני חווה רגשות קשים להשתמש בזה כדי לעזור לעצמי להירגע"},
  תסכול: {signal:"אני כבר מנסה הרבה פעמים וזה לא מצליח", body:"חוזר שוב ושוב על אותה פעולה, הגוף נעשה מתוח ואפילו כואב הראש, תחושה שהמוח תקוע", help:"לעצור לקחת אוויר, אפשר גם לקחת פסק זמן להירגע ולנסות שוב הפעם בדרך אחרת כי כנראה הקודמת לא עזרה"},
  קנאה:  {signal:"למישהו אחר יש משהו שאני רוצה", body:"תחושה חזקה בגוף ובראש לרצות משהו שלא שלי, העיניים לא מפסיקות להסתכל על מה שאני רוצה, תחושת אי שקט בגוף", help:"לזהות מה אני רוצה, להעריך את מה שכבר יש לי. אני גם יכול להפוך את זה למטרה עבורי להשיג בעצמי בדרכים טובות"},
};

const ENAMES = Object.keys(EDATA);
const TOTAL  = ENAMES.length;
const PAL    = ["#6C63FF","#FF6B6B","#43D08A","#FFD166","#38BDF8","#F472B6","#FB923C","#A3E635"];

/* ══ CATEGORIES ══ */
let categories = [
  {name:"שם הרגש",         key:null,     color:"#92400e", type:"image"},
  {name:"מה הרגש אומר לי", key:"signal", color:"#5b21b6", type:"text"},
  {name:"איך הגוף מרגיש",  key:"body",   color:"#9f1239", type:"text"},
  {name:"מה יכול לעזור",   key:"help",   color:"#1e3a8a", type:"text"},
];
let catVisible = [];

/* ══ STATE ══ */
let players   = [];
let curIdx    = 0;
let totalDone = 0;
let alwaysOpenMode = false;

let pProgress = []; // {emotion, matchedCats: Set of category indices}
let openCards = new Map();
let undoStack = [];
let toastTim  = null;

// matchedSets[emotion] = {playerIdx, player, cats:{col: {catName,catColor,content,isImage}}}
let matchedSets = {};

// cardStore[ename+'-'+col] = {card, placeholder} — keeps matched cards so we can restore them to board
let cardStore = {};
let restoredSeries = null; // ename of series currently shown on board (or null)

/* ══ SETUP ══ */
function init(){ addRow(); addRow(); }

function addRow(name, color){
  const list = document.getElementById('plist');
  const idx  = list.children.length;
  if(idx >= 6) return;
  const col  = color || PAL[idx % PAL.length];
  const row  = document.createElement('div');
  row.className='prow'; row.dataset.col=col;
  const inp=document.createElement('input');
  inp.className='pname';inp.type='text';inp.placeholder=`שחקן ${idx+1}`;inp.maxLength=14;
  row.appendChild(inp);
  const sw=document.createElement('div');sw.className='swatches';
  PAL.forEach(c=>{
    const s=document.createElement('div');
    s.className='sw'+(c===col?' on':'');s.style.background=c;
    s.onclick=()=>{row.dataset.col=c;row.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));s.classList.add('on');};
    sw.appendChild(s);
  });
  row.appendChild(sw);
  if(idx>0){
    const rm=document.createElement('button');rm.className='rmbtn';rm.textContent='✕';
    rm.onclick=()=>{row.remove();document.getElementById('addBtn').style.display='';};
    row.appendChild(rm);
  }
  list.appendChild(row);
  if(list.children.length>=6) document.getElementById('addBtn').style.display='none';
}

function startGame(){
  players=[];
  document.querySelectorAll('#plist .prow').forEach((r,i)=>{
    const n=r.querySelector('.pname').value.trim();
    players.push({disp:n||`שחקן ${i+1}`,color:r.dataset.col,score:0});
  });
  curIdx=0; totalDone=0;
  pProgress=players.map(()=>({emotion:null,matchedCats:new Set()}));
  matchedSets={};
  cardStore={};
  restoredSeries=null;
  catVisible=categories.map(()=>true);
  alwaysOpenMode=false;
  resetTurn();
  buildBoard();
  showScreen('gameScreen');
}

function goSetup(){
  const list=document.getElementById('plist');
  list.innerHTML='';document.getElementById('addBtn').style.display='';
  players.forEach(p=>addRow(p.disp,p.color));
  showScreen('setupScreen');
}

/* ══ BUILD BOARD (only on new game / restart) ══ */
function shuf(a){return[...a].sort(()=>Math.random()-.5);}

function buildBoard(){
  const container=document.getElementById('boardBlocks');
  container.innerHTML='';
  categories.forEach((cat,ci)=>{
    const block=document.createElement('div');
    block.className='cat-block'+(catVisible[ci]?'':' hidden');
    block.id='catBlock'+ci;

    const hdr=document.createElement('div');
    hdr.className='cat-block-hdr';
    hdr.style.background=cat.color;
    hdr.textContent=cat.name;
    block.appendChild(hdr);

    const grid=document.createElement('div');
    grid.className='cat-block-grid';
    grid.id='catGrid'+ci;
    shuf(ENAMES).forEach((ename,i)=>grid.appendChild(makeCard(ename,ci,i+1)));
    block.appendChild(grid);
    container.appendChild(block);
  });

  // If always-open mode, reveal cat0 cards
  if(alwaysOpenMode) applyAlwaysOpen();

  renderToggles();
  renderHeader();
  renderMatchedArea();
  document.getElementById('progTxt').textContent=`${totalDone} / ${TOTAL} סדרות`;
}

function makeCard(ename,col,num){
  const el=document.createElement('div');
  el.className='card';
  el.dataset.ename=ename;
  el.dataset.col=String(col);
  el.dataset.state='0';
  const cat=categories[col];
  if(cat.type==='image'){
    el.innerHTML=`<div class="c-num">${num}</div>
      <div class="c-lbl">${cat.name}</div>
      <img class="c-img" src="${IMGS[ename]}" alt="${ename}">
      <div class="c-name">${ename}</div>`;
  } else if(cat.custom){
    el.innerHTML=`<div class="c-num">${num}</div>
      <div class="c-lbl">${cat.name}</div>
      <div class="c-text">${cat.custom[ename]||''}</div>`;
  } else {
    el.innerHTML=`<div class="c-num">${num}</div>
      <div class="c-lbl">${cat.name}</div>
      <div class="c-text">${EDATA[ename][cat.key]}</div>`;
  }
  el.addEventListener('click',()=>onCardClick(el));
  return el;
}

/* ══ CATEGORY TOGGLES ══ */
function renderToggles(){
  const bar=document.getElementById('catToggles');
  bar.innerHTML='<span class="ct-label">קטגוריות:</span>';
  categories.forEach((cat,ci)=>{
    const btn=document.createElement('button');
    btn.className='cat-tog'+(catVisible[ci]?'':' off');
    btn.style.background=catVisible[ci]?cat.color:'transparent';
    btn.style.borderColor=cat.color;
    btn.textContent=cat.name;
    btn.onclick=()=>toggleCat(ci);
    bar.appendChild(btn);
  });
  // Always-open mode toggle
  const modeBtn=document.createElement('button');
  modeBtn.className='ct-mode'+(alwaysOpenMode?' on':'');
  modeBtn.textContent=alwaysOpenMode?'👁 רגשות גלויים':'👁 הצג רגשות';
  modeBtn.onclick=toggleAlwaysOpen;
  bar.appendChild(modeBtn);
}

function toggleCat(ci){
  if(alwaysOpenMode && ci===0) return; // Can't hide cat0 in always-open mode
  catVisible[ci]=!catVisible[ci];
  const block=document.getElementById('catBlock'+ci);
  if(block) block.classList.toggle('hidden',!catVisible[ci]);
  renderToggles();
}

/* ══ ALWAYS-OPEN MODE ══ */
function toggleAlwaysOpen(){
  hideSeriesToMatched();
  alwaysOpenMode=!alwaysOpenMode;
  if(alwaysOpenMode){
    catVisible[0]=true;
    const block=document.getElementById('catBlock0');
    if(block) block.classList.remove('hidden');
    // First move any previously matched cards to bottom
    moveMatchedCardsDown();
    // Then close all open non-perm cards
    closeAllOpenCards();
    // Reset current player progress
    pProgress[curIdx].emotion=null;
    pProgress[curIdx].matchedCats=new Set();
    undoStack=[]; updateUndoBtn();
    // Now reveal cat0 cards
    applyAlwaysOpen();
  } else {
    // First move any matched cards to bottom
    moveMatchedCardsDown();
    // Close ALL open non-perm cards (all categories, not just cat0)
    document.querySelectorAll('.card').forEach(c=>{
      if(!c.dataset.perm && parseInt(c.dataset.state)>0){
        c.dataset.state='0';
        c.className='card';
        c.classList.remove('selected');
      }
    });
    openCards.clear();
    // Reset current player progress
    pProgress[curIdx].emotion=null;
    pProgress[curIdx].matchedCats=new Set();
    undoStack=[]; updateUndoBtn();
  }
  renderToggles();
}

function applyAlwaysOpen(){
  document.querySelectorAll('.card[data-col="0"]').forEach(c=>{
    if(!c.dataset.perm && !c.classList.contains('completed')){
      c.dataset.state='2';
      c.className='card open-full';
    }
  });
}

/* ══ CARD CLICK ══ */
function onCardClick(el){
  const col   = parseInt(el.dataset.col);
  const ename = el.dataset.ename;
  const state = parseInt(el.dataset.state);

  if(el.classList.contains('locked') || el.classList.contains('completed')){
    // Allow revealing name on locked cat0 img-only
    if(col===0 && state===1){
      el.dataset.state='2';
      el.className='card open-full locked';
    }
    return;
  }

  const pp = pProgress[curIdx];

  /* Always-open mode: cat0 is for selection only */
  if(alwaysOpenMode && col===0){
    // Deselect all cat0 cards
    document.querySelectorAll('.card[data-col="0"]').forEach(c=>c.classList.remove('selected'));
    if(pp.emotion===ename){
      // Deselect
      pp.emotion=null;
      pp.matchedCats=new Set();
    } else {
      // Select this emotion
      el.classList.add('selected');
      pp.emotion=ename;
      pp.matchedCats=new Set([0]);
    }
    return;
  }

  /* Cat0 (image type): 3-state */
  if(categories[col].type==='image' && col===0){
    if(state===0){
      // Auto-close any other open cat0 card first
      document.querySelectorAll('.card[data-col="0"]').forEach(c=>{
        if(c!==el && !c.dataset.perm && parseInt(c.dataset.state)>0){
          c.dataset.state='0';
          c.className='card';
        }
      });
      saveUndo(el);
      el.dataset.state='1';
      el.className='card open-img';
      openCards.set(col,el);
      updateUndoBtn();
      // Set emotion
      pp.emotion=ename;
      pp.matchedCats=new Set([0]);
    } else if(state===1){
      el.dataset.state='2';
      el.className='card open-full';
    } else if(state===2){
      closeCard(el);
      if(pp.emotion===ename){pp.emotion=null;pp.matchedCats=new Set();}
    }
    return;
  }

  /* Other categories: toggle open/close */
  if(state===0){
    saveUndo(el);
    el.dataset.state='2';
    el.className='card open-full';
    openCards.set(col,el);
    updateUndoBtn();
  } else {
    closeCard(el);
  }
}

/* ══ CHECK MATCH (manual button) ══ */
function checkMatch(){
  const pp     = pProgress[curIdx];
  const player = players[curIdx];

  // Step 1: Find the active emotion
  let activeEmotion = null;
  if(alwaysOpenMode){
    const sel = document.querySelector('.card[data-col="0"].selected');
    if(sel) activeEmotion = sel.dataset.ename;
  } else {
    document.querySelectorAll('.card[data-col="0"]').forEach(c=>{
      if(parseInt(c.dataset.state)>0 && !c.dataset.perm) activeEmotion = c.dataset.ename;
    });
  }
  // Fallback: if cat0 is already locked but series continues, use pp.emotion
  if(!activeEmotion && pp.emotion) activeEmotion = pp.emotion;

  if(!activeEmotion){
    showFeedback('😊 קודם בחר קלף רגש!','wrong');
    return;
  }

  // Sync pp with actual open card
  if(pp.emotion !== activeEmotion){
    pp.emotion = activeEmotion;
    pp.matchedCats = new Set([0]);
  }
  if(!pp.matchedCats.has(0)) pp.matchedCats.add(0);

  // Step 2: Find all open non-perm cards in categories NOT yet matched
  let matchingCards = []; // cards matching the emotion in unmatched categories
  let wrongCards    = []; // cards NOT matching in unmatched categories

  for(let ci=1; ci<categories.length; ci++){
    if(pp.matchedCats.has(ci)) continue; // already matched
    document.querySelectorAll(`.card[data-col="${ci}"]`).forEach(c=>{
      if(parseInt(c.dataset.state)>0 && !c.dataset.perm){
        if(c.dataset.ename === activeEmotion){
          matchingCards.push({card:c, col:ci});
        } else {
          wrongCards.push({card:c, col:ci});
        }
      }
    });
  }

  if(matchingCards.length===0 && wrongCards.length===0){
    showFeedback('😊 פתח קלף בקטגוריה אחרת!','wrong');
    return;
  }

  if(matchingCards.length===0){
    showFeedback('😊 טעות! לא נורא,\nלמדנו משהו חדש!','wrong');
    return;
  }

  // ✅ Match found! Lock ALL matching cards in unmatched categories
  showFeedback('🎉 כל הכבוד!\nהצלחת להתאים!','ok');
  const ename = activeEmotion;

  // Lock the matching cards + cat0 if not yet locked
  document.querySelectorAll('.card').forEach(c=>{
    if(c.dataset.ename===ename && parseInt(c.dataset.state)>0 && !c.dataset.perm){
      const cCol=parseInt(c.dataset.col);

      c.classList.add('locked');
      c.classList.remove('selected');
      c.dataset.perm='1';
      c.style.background=player.color+'50';
      c.style.borderColor=player.color;
      c.style.boxShadow=`0 0 16px ${player.color}90`;
      c.style.color='#fff';
      openCards.delete(cCol);

      pp.matchedCats.add(cCol);

      const cat=categories[cCol];
      let content='';
      if(cat.type==='image') content=ename;
      else if(cat.custom) content=cat.custom[ename]||'';
      else content=EDATA[ename][cat.key];

      if(!matchedSets[ename]) matchedSets[ename]={playerIdx:curIdx,player,cats:{}};
      matchedSets[ename].cats[cCol]={catName:cat.name,catColor:cat.color,content,isImage:cat.type==='image'};
    }
  });

  undoStack=[]; updateUndoBtn();

  // Check if ALL categories matched → series complete
  if(pp.matchedCats.size>=categories.length){
    pp.emotion=null; pp.matchedCats=new Set();
    totalDone++;
    players[curIdx].score+=10;
    renderHeader();
    document.getElementById('progTxt').textContent=`${totalDone} / ${TOTAL} סדרות`;
    confetti(player.color);
    if(totalDone===TOTAL){ setTimeout(showWin,2600); return; }
  }

  // Update matched area to show new counts
  renderMatchedArea();
}

/* ══ MATCHED AREA (table by player) ══ */
function renderMatchedArea(){
  const emotions=Object.keys(matchedSets);
  const area=document.getElementById('matchedArea');
  const list=document.getElementById('matchedList');
  if(emotions.length===0){area.style.display='none';return;}
  area.style.display='';

  // Group by player
  const byPlayer={};
  players.forEach((_,i)=>{byPlayer[i]=[];});
  emotions.forEach(ename=>{
    const ms=matchedSets[ename];
    if(!byPlayer[ms.playerIdx]) byPlayer[ms.playerIdx]=[];
    byPlayer[ms.playerIdx].push(ename);
  });

  const maxRows=Math.max(...Object.values(byPlayer).map(a=>a.length),1);

  let html='<table class="matched-table"><thead><tr>';
  players.forEach((p,i)=>{
    html+=`<th style="background:${p.color}33;color:${p.color}">● ${p.disp} (${p.score})</th>`;
  });
  html+='</tr></thead><tbody>';

  for(let r=0;r<maxRows;r++){
    html+='<tr>';
    players.forEach((_,i)=>{
      const ename=byPlayer[i][r];
      if(ename){
        const ms=matchedSets[ename];
        const cnt=Object.keys(ms.cats).length;
        const total=categories.length;
        const isComplete=cnt>=total;
        const isActive=(pProgress[curIdx].emotion===ename && ms.playerIdx===curIdx);
        const canClick=(ms.playerIdx===i && i===curIdx && !isComplete);
        html+=`<td><div class="mt-series${isComplete?' complete':''}${isActive?' active':''}"${canClick?` onclick="selectSeries('${ename}')"`:''}>`;
        html+=`<img src="${IMGS[ename]}" alt="${ename}">${ename}`;
        html+=`<span class="mt-count">${cnt}/${total}</span>`;
        html+=`</div></td>`;
      } else {
        html+='<td></td>';
      }
    });
    html+='</tr>';
  }
  html+='</tbody></table>';
  list.innerHTML=html;
}

/* ══ SELECT SERIES (from matched area) ══ */
function selectSeries(ename){
  const ms=matchedSets[ename];
  if(!ms || ms.playerIdx!==curIdx) return; // can only select own series
  const pp=pProgress[curIdx];

  // Close any open non-perm cards first
  closeAllOpenCards();
  undoStack=[]; updateUndoBtn();

  // Set emotion and reconstruct matchedCats from matchedSets
  pp.emotion=ename;
  pp.matchedCats=new Set(Object.keys(ms.cats).map(Number));

  // Restore matched cards to the board so player can see them
  restoreSeriesToBoard(ename);

  // Update turn banner to show selected series
  const p=players[curIdx];
  document.getElementById('turnTxt').innerHTML=`<span style="color:${p.color}">● ${p.disp}</span> — סדרה: <strong>${ename}</strong> (${pp.matchedCats.size}/${categories.length})`;

  renderMatchedArea();
}

/* ══ CLOSE HELPERS ══ */
function closeCard(el){
  el.dataset.state='0';
  el.className='card';
  openCards.delete(parseInt(el.dataset.col));
  undoStack=undoStack.filter(u=>u.el!==el);
  updateUndoBtn();
}

function closeAllOpenCards(){
  document.querySelectorAll('.card').forEach(el=>{
    if(!el.dataset.perm && parseInt(el.dataset.state)>0){
      // In always-open mode, keep cat0 cards open but deselect
      if(alwaysOpenMode && parseInt(el.dataset.col)===0){
        el.classList.remove('selected');
        el.dataset.state='2';
        el.className='card open-full';
        return;
      }
      el.dataset.state='0';
      el.className='card';
      el.classList.remove('selected');
    }
  });
  openCards.clear();
}

/* ══ MOVE MATCHED CARDS TO BOTTOM ══ */
function moveMatchedCardsDown(){
  document.querySelectorAll('.card[data-perm="1"]').forEach(c=>{
    const ename=c.dataset.ename;
    const col=c.dataset.col;
    const key=ename+'-'+col;
    const empty=document.createElement('div');
    empty.className='card-empty';
    empty.dataset.key=key; // mark placeholder so we can find it
    cardStore[key]={card:c,placeholder:empty};
    c.replaceWith(empty);
  });
  restoredSeries=null;
  renderMatchedArea();
}

/* ══ RESTORE / HIDE SERIES ON BOARD ══ */
function restoreSeriesToBoard(ename){
  // First hide any currently restored series
  if(restoredSeries && restoredSeries!==ename) hideSeriesToMatched();
  if(restoredSeries===ename) return; // already showing

  const ms=matchedSets[ename];
  if(!ms) return;

  Object.keys(ms.cats).forEach(col=>{
    const key=ename+'-'+col;
    const stored=cardStore[key];
    if(stored && stored.placeholder.parentNode){
      stored.placeholder.replaceWith(stored.card);
    }
  });
  restoredSeries=ename;
}

function hideSeriesToMatched(){
  if(!restoredSeries) return;
  const ename=restoredSeries;
  const ms=matchedSets[ename];
  if(!ms) {restoredSeries=null;return;}

  Object.keys(ms.cats).forEach(col=>{
    const key=ename+'-'+col;
    const stored=cardStore[key];
    if(stored && stored.card.parentNode){
      stored.card.replaceWith(stored.placeholder);
    }
  });
  restoredSeries=null;
}

/* ══ END TURN ══ */
function endTurn(){
  closeAllOpenCards();
  hideSeriesToMatched();
  moveMatchedCardsDown();
  resetTurn();
  curIdx=(curIdx+1)%players.length;
  // Reset turn state - player will select series from matched area if needed
  pProgress[curIdx].emotion=null;
  pProgress[curIdx].matchedCats=new Set();
  renderHeader();
  // Re-render matched area so the NEW player's series become clickable
  renderMatchedArea();
}

/* ══ UNDO ══ */
function saveUndo(el){
  undoStack.push({el,col:parseInt(el.dataset.col),prevState:el.dataset.state,prevClass:el.className});
}
function doUndo(){
  if(undoStack.length===0) return;
  const u=undoStack.pop();
  const el=u.el;
  if(el.dataset.perm){updateUndoBtn();return;}
  el.dataset.state=u.prevState;
  el.className=u.prevClass;
  openCards.delete(u.col);
  if(u.col===0){
    pProgress[curIdx].emotion=null;
    pProgress[curIdx].matchedCats=new Set();
  }
  updateUndoBtn();
}

function resetTurn(){
  closeAllOpenCards();
  undoStack=[];
  updateUndoBtn();
}

/* ══ RESTART ══ */
function restart(){
  totalDone=0;
  players.forEach(p=>p.score=0);
  curIdx=0;
  pProgress=players.map(()=>({emotion:null,matchedCats:new Set()}));
  matchedSets={};
  cardStore={};
  restoredSeries=null;
  catVisible=categories.map(()=>true);
  resetTurn();
  buildBoard();
}

/* ══ RENDER ══ */
function renderHeader(){
  const p=players[curIdx];
  document.getElementById('pbar').innerHTML=players.map((pl,i)=>{
    const a=i===curIdx;
    return `<div class="chip" style="${a?`border-color:${pl.color};background:${pl.color}22`:''}">
      <div class="dot" style="background:${pl.color}"></div>${pl.disp}
      <span class="pts">${pl.score}</span></div>`;
  }).join('');
  document.getElementById('turnTxt').innerHTML=`<span style="color:${p.color}">● ${p.disp}</span> — התור שלך`;
  const tb=document.getElementById('tbanner');
  tb.style.background=p.color+'14';
  tb.style.borderBottom=`1px solid ${p.color}33`;
}

function updateUndoBtn(){
  document.getElementById('undoBtn').disabled=undoStack.length===0;
}

/* ══ FEEDBACK BANNER ══ */
function showFeedback(msg,type){
  // Remove any existing banner
  document.querySelectorAll('.feedback-banner').forEach(b=>b.remove());
  const banner=document.createElement('div');
  banner.className=`feedback-banner ${type}`;
  banner.textContent=msg;
  banner.style.whiteSpace='pre-line';
  document.body.appendChild(banner);
  requestAnimationFrame(()=>banner.classList.add('show'));
  setTimeout(()=>{
    banner.classList.remove('show');
    setTimeout(()=>banner.remove(),350);
  },1800);
}

/* ══ TOAST ══ */
function showToast(msg,type){
  if(toastTim){clearTimeout(toastTim);document.querySelectorAll('.toast').forEach(t=>t.remove());}
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);
  toastTim=setTimeout(()=>t.remove(),2400);
}

/* ══ WIN ══ */
function showWin(){
  const s=[...players].sort((a,b)=>b.score-a.score);
  const m=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
  document.getElementById('wscores').innerHTML=s.map((p,i)=>`
    <div class="wrow ${i===0?'gold':''}">
      <span class="wrank">${m[i]||'🏅'}</span>
      <div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0"></div>
      <span class="wname" style="color:${p.color}">${p.disp}</span>
      <span class="wpts">${p.score} נק'</span>
    </div>`).join('');
  showScreen('winScreen');confetti('#FFD166',120);
}

/* ══ CONFETTI ══ */
function confetti(base,count=65){
  const pal=[base,'#fff','#FFD166','#ff8fab','#a89fff'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    const sz=(7+Math.random()*9).toFixed(1);
    const dur=(1.8+Math.random()*1.4).toFixed(2);
    const del=(Math.random()*.5).toFixed(2);
    el.style.cssText=`position:fixed;top:-14px;left:${(Math.random()*100).toFixed(1)}%;width:${sz}px;height:${sz}px;background:${pal[Math.floor(Math.random()*pal.length)]};border-radius:${Math.random()>.5?'50%':'3px'};pointer-events:none;z-index:9999;animation:cfFall ${dur}s ${del}s linear forwards;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(parseFloat(dur)+parseFloat(del)+.2)*1000);
  }
}

/* ══ UTIL ══ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
